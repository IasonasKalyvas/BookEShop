{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css'%}">
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="user_card">

        <h3 id="form-title">LOGIN</h3>

        {% if error_message %}
            <div class="form-error">
                {{ error_message }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" maxlength="50" class="form-control" placeholder="Username...">
            </div>

            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-key"></i></span>
                <input type="password" name="password" maxlength="50" class="form-control" placeholder="Password...">
            </div>

            <input class="btn login_btn" type="submit" value="Login">
        </form>

        <div class="links">
            Don't have an account?
            <a href="{% url 'accounts:register' %}">Sign Up</a>
        </div>

        Demo credentials: Admin: Iasonas / jkal12345

    </div>

</div>

{% endblock %}
