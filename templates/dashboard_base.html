{% extends "base.html" %}
{% load static %}

{% block content %}

<!-- Dashboard layout -->
<div class="dashboard-container">
    <aside class="dashboard-sidebar">
        <h3>Dashboard</h3>
        <ul>
            <li>
                <a href="{% url 'accounts:manage_categories' %}">
                    Manage Categories
                </a>
            </li>
            {% if is_manager %}
                <li>
                    <a href="{% url 'accounts:manage_books' %}">
                        Manage Books
                    </a>
                </li>
                <li>
                    <a href="{% url 'accounts:manage_users' %}">
                        Manage Users
                    </a>
                </li>
                <li>
                    <a href="{% url 'reviews:manage_reviews' %}">
                        Manage Reviews
                    </a>
                </li>
            {% endif %}
        </ul>
    </aside>
    <!-- Dashboard content -->
    <section class="dashboard-content">
        {% block dashboard_content %}
        {% endblock %}
    </section>
</div>

{% endblock %}
