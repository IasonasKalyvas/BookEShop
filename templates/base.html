{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Online Book Shop">
    <meta name="keywords" content="books, shop, online">
    <meta name="author" content="Your Name">
    <title>{% block title %}Book Shop{% endblock %}</title>
    <!-- MAIN CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- 🔝 NAVBAR -->
    <nav class="navbar">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'books:book_list' %}">Books</a>
        <a href="{% url 'books:featured_books' %}">Featured</a>
        <a href="{% url 'books:out_of_stock' %}">Out of Stock</a>
        <div class="nav-right">
            <a href="{% url 'accounts:login' %}" class="icon-btn">👤</a>
            <button class="icon-btn">🌙</button>
        </div>
    </nav>

    <hr>
    <!-- 📄 PAGE CONTENT -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- 🔻 FOOTER -->
    <footer class="footer">
        <div class="footer-container">
            <p>© 2026 BookEShop. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Support</a>
            </div>
        </div>
    </footer>

    <!-- JS -->
    <script src="{% static 'js/main.js' %}" defer></script>

</body>
</html>
